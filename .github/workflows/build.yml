name: build-wasm
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build
        id: build
        continue-on-error: true
        run: |
          cd rust/wasm
          wasm-pack build --release --target bundler 2>&1 | tee /tmp/build.log
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Publish output to repo
        run: |
          mkdir -p dist
          cp /tmp/build.log dist/build.log || true
          if [ -d rust/wasm/pkg ]; then rm -rf dist/pkg && cp -r rust/wasm/pkg dist/pkg; fi
          git config user.name "majan-ci"
          git config user.email "ci@majan.local"
          git pull --rebase || true
          git add -A dist
          git commit -m "ci: build output (code=${{ steps.build.outputs.code }})" || echo "nothing to commit"
          git push
      - name: Report status
        run: exit ${{ steps.build.outputs.code }}
